name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: 构建并发布 Release
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 缓存并生成 debug 签名密钥
        id: debug-key
        uses: actions/cache@v4
        with:
          path: ci-debug.keystore
          key: ci-debug-keystore-v1

      - name: 生成 debug 签名密钥（首次运行）
        if: steps.debug-key.outputs.cache-hit != 'true'
        run: |
          keytool -genkey -v -keystore ci-debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname 'CN=Android Debug, O=Android, C=US'

      - name: 构建 Debug APK（已签名，可直接安装）
        run: ./gradlew assembleDebug --build-cache --parallel --configure-on-demand

      - name: 创建 Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: 修仙群侠传 ${{ github.ref_name }}
          body: |
            ## 🏯 修仙群侠传 ${{ github.ref_name }}

            由 CI/CD 自动构建发布。下载 APK 直接安装到手机即可。
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/*.apk
